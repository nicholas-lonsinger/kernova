# Periphery dead-code scan configuration.
# https://github.com/peripheryapp/periphery
#
# Run via the weekly `.github/workflows/dead-code.yml` job. Local invocation
# is intentionally not supported in this repo — Periphery is not installed
# via brew or otherwise. To trigger an ad-hoc run:
#
#     gh workflow run dead-code.yml

project: Kernova.xcodeproj
schemes:
  - Kernova
  - KernovaGuestAgent
  - KernovaRelaunchHelper

# `KernovaKit` is a closed monorepo package — every consumer (the
# `Kernova` app and `KernovaGuestAgent`) lives in this same project, so
# Periphery's cross-target index can resolve real usage of public symbols.
# We let it surface unused public declarations rather than retaining them
# wholesale. If a specific public symbol is exported intentionally but
# unused in-repo, prefer a per-symbol `// periphery:ignore` over flipping
# this back to `true`.
retain_public: false

# Keeps AppKit selectors, NSMenuItemValidation conformance, target/action
# wiring, and KVO observers from being flagged.
retain_objc_accessible: true

# Properties that are only assigned (never read) often back IBOutlets or
# observation tokens whose lifetime IS the value — flagging them is noisy.
retain_assign_only_properties: true

# Delegate-protocol methods follow the Cocoa convention of passing the
# sender back (`func diskSizePopover(_ vc: …)`); conformers routinely don't
# use that argument. Retaining unused protocol-function parameters silences
# that noise while still flagging genuinely-dead parameters on non-protocol
# functions. (`@objc` action `sender` params aren't protocol funcs, so they
# are handled at the source: the unused binding is renamed to `_`.)
retain_unused_protocol_func_params: true

report_exclude:
  - "**/.build/**"
  - "DerivedData/**"
  # SwiftProtobuf-generated sources include unused symbols (e.g. the
  # `_GeneratedWithProtocGenSwiftVersion` version-check struct) that are
  # part of the generator's contract — not actionable findings.
  - "**/Generated/**"
