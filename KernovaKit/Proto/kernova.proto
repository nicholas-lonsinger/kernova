// Kernova guest <-> host wire protocol.
//
// All traffic on a vsock connection is a sequence of length-prefixed Frame
// messages. Each Frame carries exactly one payload selected by the `payload`
// oneof. Field numbers and existing payload types must never be reused; new
// services append new payload types at the next available number.
syntax = "proto3";

package kernova.v1;

// A single message on the wire. The `payload` oneof selects the message type.
//
// Wire layout: a 4-byte big-endian uint32 length prefix (NOT included in the
// length count itself) followed by `length` bytes of the encoded Frame.
message Frame {
  // Protocol version. Bumped when the framing or required fields change in a
  // backwards-incompatible way. Currently 1.
  uint32 protocol_version = 1;

  // 22 was `ClipboardData`, the legacy single-frame clipboard data path
  // (whole payload in one frame). Retired in favour of the chunk-streamed
  // protocol (`ClipboardStreamBegin`/`ClipboardChunk`/`ClipboardStreamEnd`).
  // Never reuse — reserved for wire history.
  reserved 22;

  oneof payload {
    Hello hello = 10;
    Error error = 11;
    Heartbeat heartbeat = 12;

    // Service payloads occupy reserved number ranges so each service can grow
    // independently without colliding:
    //   12..19 reserved for control plane (heartbeat, policy, future control)
    //   20..29 reserved for clipboard
    //   30..39 reserved for logging
    //   40..49 reserved for drag/drop
    PolicyUpdate policy_update = 13;

    ClipboardOffer clipboard_offer = 20;
    ClipboardRequest clipboard_request = 21;
    // 22 retired (see `reserved` above).
    ClipboardRelease clipboard_release = 23;

    // Chunk-streamed clipboard data. One streamed representation per
    // `transfer_id`: Begin announces it, a series of Chunks carries the bytes,
    // End commits with a digest. Ack is the receiver's credit + go-signal,
    // Abort is an in-band graceful failure (disk full, read error, supersede).
    ClipboardStreamBegin clipboard_stream_begin = 24;
    ClipboardChunk clipboard_chunk = 25;
    ClipboardStreamEnd clipboard_stream_end = 26;
    ClipboardStreamAck clipboard_stream_ack = 27;
    ClipboardStreamAbort clipboard_stream_abort = 28;

    // Directory placeholder-tree fetch (folder D1b, capability
    // `clipboard.dirtree.v1`). Requests either a directory rep's tree listing
    // or one child file within it; the reply reuses the
    // ClipboardStreamBegin/Chunk/End transport keyed by `transfer_id`.
    ClipboardTreeFetch clipboard_tree_fetch = 29;

    LogRecord log_record = 30;
  }
}

// Sent by both sides immediately after a vsock connection is accepted.
//
// Each side advertises its protocol version, the capabilities it supports,
// and identifying information for diagnostics. Capability strings use a dotted
// namespace (e.g. "clipboard.text", "clipboard.image.png", "log.records.v1").
message Hello {
  // Bumps when the service-level protocol changes within a given
  // `protocol_version`. Independent from `Frame.protocol_version`.
  uint32 service_version = 1;

  // Capability tags advertised by the sender. Receivers ignore unknown tags.
  repeated string capabilities = 2;

  // Optional identifying info. Diagnostic only; not used for routing.
  AgentInfo agent_info = 3;

  // The guest-agent version the *host* currently bundles, sent host->guest so
  // the guest can show its own update state ("up to date" / "update available")
  // in its menu-bar UI. Populated only by the host's control service; the
  // guest leaves it empty in its own Hello. Empty when unknown (e.g. a host
  // predating this field, or its version sidecar is missing) — the guest must
  // treat empty as "no update info" and never render an update prompt from it.
  string bundled_agent_version = 4;
}

// Identifying info about the peer. All fields are optional — populate what's
// useful, leave the rest empty.
message AgentInfo {
  string os = 1;             // e.g. "macOS", "Linux"
  string os_version = 2;     // e.g. "26.0", "6.8.0"
  string agent_version = 3;  // e.g. "0.1.0"
}

// One unit of log output forwarded from a guest agent to the host.
//
// The guest formats the message text locally so all privacy decisions stay on
// the guest side; the host treats `message` as opaque and republishes it via
// its own logger. Levels map directly onto Apple's `os.Logger` log levels so
// the host can pass them through with the same severity semantics.
message LogRecord {
  enum Level {
    LEVEL_UNSPECIFIED = 0;
    LEVEL_DEBUG = 1;
    LEVEL_INFO = 2;
    LEVEL_NOTICE = 3;
    LEVEL_WARNING = 4;
    LEVEL_ERROR = 5;
    LEVEL_FAULT = 6;
  }

  // Wall-clock time at which the record was emitted on the guest, expressed
  // as milliseconds since the Unix epoch in UTC. Hosts may apply their own
  // clock-skew correction; the field is intended for chronological ordering
  // and post-mortem analysis, not strict synchronisation.
  int64 timestamp_ms = 1;

  Level level = 2;

  // Logger subsystem and category from the guest, e.g. "app.kernova.macosagent" /
  // "VsockGuestClipboardAgent". Treated as opaque labels by the host.
  string subsystem = 3;
  string category = 4;

  // Pre-formatted message text. Must be valid UTF-8.
  string message = 5;
}

// Per-representation metadata advertised in a `ClipboardOffer`. Carries no
// bytes — it lets the receiver register lazy promises, render a preview, and
// pre-decide disk needs before pulling any data.
message ClipboardRepresentationInfo {
  string uti = 1;  // e.g. "public.utf8-plain-text", "public.png"

  // Size of the representation's bytes. For a copied file this is the file's
  // size from a stat — the bytes themselves are never read to build the offer.
  // For a directory rep (`is_directory`) the meaning depends on the negotiated
  // `clipboard.dirtree.v1` capability: without it, the exact byte count of the
  // eagerly-built archive; with it, a stat-walk size ESTIMATE of the source
  // tree (no archive is built at copy time — see the placeholder-tree design,
  // #422/#376). The estimate is advisory (UI/free-space preflight only): each
  // child file's exact size + SHA-256 ride the per-child stream, and the
  // request-time-archived fallback carries its own exact size in its
  // `ClipboardStreamBegin`.
  uint64 byte_count = 2;

  // Suggested filename when this representation is a file payload (e.g. a
  // copied image file → "photo.png"). Empty means inline-only: the receiver
  // reassembles the bytes in memory and renders them but does not materialize
  // a file. When set, the receiver streams the bytes to a local temp file and
  // offers its file URL so a Finder paste creates the file. Each non-empty
  // filename is a distinct file, so a multi-file copy carries several. Folded
  // into the content digest (it round-trips identically across the wire) so two
  // files that share bytes+UTI but differ only by name are distinguishable —
  // the file *path* is still never hashed.
  string filename = 3;

  // Whether this representation should be placed inline on the pasteboard
  // (text/RTF/inline image) versus materialized as a file. Mirrors the
  // sender's inline-vs-file decision so the receiver chooses its sink (RAM vs
  // temp file) without re-deriving the rule.
  bool is_inline = 4;

  // Whether this file representation is a *directory* (folder, or an OS
  // package such as .app/.rtfd). Implies a non-empty `filename` (the folder
  // name, without an archive suffix) and `is_inline = false`.
  //
  // How the tree crosses depends on the negotiated `clipboard.dirtree.v1`
  // capability:
  //  - Without it (old peer): the directory rides the plain-file stream path —
  //    the streamed bytes are an in-process AppleArchive (.aar, LZFSE) of the
  //    tree, which the receiver extracts into a real directory. `byte_count`
  //    is the archive's exact size.
  //  - With it: the directory pastes as a File Provider placeholder *tree*.
  //    The consumer fetches a listing (`ClipboardTreeFetch` with an empty
  //    `relative_path`) and each child file individually (`ClipboardTreeFetch`
  //    with the child's `relative_path`); no archive is built at copy time.
  //    A toggle-off fallback still uses the archive path, but the producer
  //    archives at request time rather than at copy time.
  //
  // The stream layer is offer-agnostic, so this flag is re-applied to the
  // delivered representation by the offer-aware layer on the receiver. Excluded
  // from the content digest — the archive's SHA-256 and the folded filename
  // already identify it.
  bool is_directory = 5;
}

// Sent by either side to advertise that fresh clipboard content is available.
// Metadata only — never carries bytes. The receiver registers lazy promises
// from `rep_info` and replies with a `ClipboardRequest` (one per representation
// actually consumed) to pull the bytes via the chunk-streamed protocol.
//
// The `generation` field is a monotonically increasing counter scoped to the
// sender. Each new offer bumps it; receivers use it to discard requests that
// race a newer offer.
message ClipboardOffer {
  uint64 generation = 1;

  // 2 was `repeated ClipboardFormat formats` (the legacy text-only format
  // enum); 3 was `repeated string utis` (a bare UTI list, superseded by the
  // richer `rep_info`). Both retired — never reuse.
  reserved 2, 3;
  reserved "formats", "utis";

  // Metadata for every available representation, richest first.
  repeated ClipboardRepresentationInfo rep_info = 4;

  // Whether the source pasteboard marked this snapshot confidential
  // (org.nspasteboard.ConcealedType — the convention password managers use).
  // The content is still offered so it can be pasted into the peer; the
  // receiver hides it behind a placeholder in its clipboard window rather than
  // rendering the secret. Snapshot-level, not per-representation.
  bool is_concealed = 5;
}

// Sent in response to a `ClipboardOffer` to pull one representation's bytes.
// The OS asks the pasteboard per type, so a paste pulls only the representation
// actually read; the requester sends one `ClipboardRequest` per representation
// it consumes. The responder answers with a `ClipboardStreamBegin` →
// `ClipboardChunk`* → `ClipboardStreamEnd` sequence keyed by `transfer_id`.
message ClipboardRequest {
  // Echoes the offer's generation so a request racing a newer offer is dropped.
  uint64 generation = 1;

  // 2 was the legacy `ClipboardFormat format`; 3 was `repeated string utis`
  // (the requester echoed the whole offer's UTI list). Both retired — a
  // request now names exactly one representation via `uti`. Never reuse.
  reserved 2, 3;
  reserved "format", "utis";

  // Correlates the streamed reply (Begin/Chunk/End/Ack/Abort) with this
  // request. `transfer_id = (generation << 16) | repIndex`, scoped per
  // connection.
  uint64 transfer_id = 4;

  // The single representation being consumed (one of the offer's `rep_info`
  // UTIs).
  string uti = 5;

  // The requester's free-space ceiling for this transfer: the responder must
  // abort (`disk.full`) rather than start a transfer the requester cannot
  // stage. 0 means "no ceiling advertised".
  uint64 max_accept_byte_count = 6;
}

// Sent by the offerer when an offer is no longer valid (e.g. the user copied
// new content before the receiver requested the old). Receivers should drop
// any pending state for the named generation.
message ClipboardRelease {
  uint64 generation = 1;
}

// Announces one streamed representation in reply to a `ClipboardRequest`. The
// bytes follow in a series of `ClipboardChunk` frames sharing `transfer_id`,
// terminated by a `ClipboardStreamEnd`.
message ClipboardStreamBegin {
  // The offer generation this transfer belongs to (so a superseded offer's
  // in-flight transfer can be recognised and dropped).
  uint64 generation = 1;

  // Correlates Begin/Chunk/End/Ack/Abort. Echoes the request's `transfer_id`.
  uint64 transfer_id = 2;

  // The representation's UTI.
  string uti = 3;

  // Total payload size in bytes; the receiver verifies the reassembled byte
  // count against this at `ClipboardStreamEnd`, and sizes its free-space
  // pre-flight check from it for a file rep.
  uint64 total_bytes = 4;

  // Suggested filename for a file rep (see `ClipboardRepresentationInfo`);
  // empty for an inline rep.
  string filename = 5;

  // Whether the receiver should reassemble in memory (inline) or stream to a
  // temp file. Mirrors `ClipboardRepresentationInfo.is_inline`.
  bool is_inline = 6;
}

// One chunk of a streamed representation. Each is a normal length-prefixed
// frame the existing decoder reassembles; the payload is at most the negotiated
// chunk size (64 KiB by default).
message ClipboardChunk {
  uint64 transfer_id = 1;

  // Byte offset of `data` within the representation. Lets the receiver detect
  // gaps/duplicates/reordering and write at the correct position.
  uint64 offset = 2;

  // The chunk bytes (<= the negotiated chunk size).
  bytes data = 3;
}

// Terminates a streamed representation. The receiver commits only after the
// reassembled byte count equals `total_bytes` and the digest matches `sha256`.
message ClipboardStreamEnd {
  uint64 transfer_id = 1;

  // Total bytes the sender streamed; must equal the Begin's `total_bytes`.
  uint64 total_bytes = 2;

  // SHA-256 over the streamed bytes, computed incrementally as the sender read
  // the source. The receiver verifies and reuses it as the representation's
  // content digest (so a multi-GB file is never re-hashed).
  bytes sha256 = 3;
}

// The receiver's credit + go-signal for a transfer. The sender holds at most
// `window_bytes` of un-acked data in flight; the receiver sends an Ack only
// after bytes are durably written, so credit tracks the slowest stage.
message ClipboardStreamAck {
  uint64 transfer_id = 1;

  // CUMULATIVE count of bytes written and verified so far (not incremental),
  // so the protocol self-heals against a lost or reordered Ack frame.
  uint64 bytes_consumed = 2;

  // The receiver's current in-flight window in bytes. The sender may have up
  // to `bytes_consumed + window_bytes` bytes sent at any time.
  uint64 window_bytes = 3;
}

// In-band graceful failure of a transfer (disk full, source read error, offer
// superseded, connection teardown imminent). The channel stays up — an abort
// is a message, not a disconnect. The peer stops, cleans up its partial state
// (deletes any partial temp file), and is ready for the next transfer.
message ClipboardStreamAbort {
  uint64 transfer_id = 1;

  // Stable machine-readable code, e.g. "disk.full", "read.error",
  // "superseded", "format.unavailable".
  string code = 2;

  // Human-readable detail for logs / user-facing messages.
  string message = 3;
}

// Requests part of a directory representation's placeholder tree (folder D1b,
// capability `clipboard.dirtree.v1`). Sent by the consumer (the side pasting a
// folder) to the producer (the side that copied it), which retains the source
// folder and walks it on demand rather than archiving eagerly.
//
// Two modes, selected by `relative_path`:
//  - Empty `relative_path`: request the directory rep's **tree listing**. The
//    producer walks the source tree and streams a serialized
//    `ClipboardTreeListing` back over the ClipboardStreamBegin/Chunk/End
//    transport as an inline payload (SHA-256-verified like any transfer).
//  - Non-empty `relative_path`: request **one child file** at that POSIX path
//    within the directory rep. The producer opens the confined child and
//    streams its bytes back over the same transport.
//
// The reply is correlated by `transfer_id`, whose child layout encodes
// `(generation, rep_index, child_seq)` with `child_seq = 0` reserved for the
// listing and `child_seq >= 1` naming a tree node (see `ClipboardTransferID`).
message ClipboardTreeFetch {
  // Echoes the offer's generation so a fetch racing a newer offer is dropped.
  uint64 generation = 1;

  // Correlates the streamed reply (Begin/Chunk/End/Ack/Abort). Uses the child
  // transfer-id layout; `child_seq = 0` is the listing, `>= 1` a tree node.
  uint64 transfer_id = 2;

  // The directory representation's index within the offer (`rep_info`). Carried
  // explicitly rather than decoded from `transfer_id` for clarity.
  uint32 rep_index = 3;

  // POSIX path of the child file relative to the directory rep's root (e.g.
  // "sub/dir/file.txt"). Empty selects the tree-listing mode. The producer
  // confines resolution beneath the source folder (no `..`/absolute escape).
  string relative_path = 4;

  // The requester's free-space ceiling for a child transfer: the producer
  // aborts (`disk.full`) rather than start a transfer the requester cannot
  // stage. 0 means "no ceiling advertised". Ignored for the listing mode.
  uint64 max_accept_byte_count = 5;
}

// One node in a directory representation's tree listing.
//
// Metadata only — no bytes. The consumer builds a File Provider placeholder
// from each entry; a file's bytes are pulled later via a child
// `ClipboardTreeFetch`. Sizes/permissions/mtimes carry fidelity so the pasted
// tree matches the source (CLIPBOARD.md §6); the per-child stream's exact size
// + SHA-256 are authoritative for the actual transfer.
message ClipboardTreeEntry {
  enum Kind {
    KIND_UNSPECIFIED = 0;
    FILE = 1;
    DIRECTORY = 2;
    SYMLINK = 3;
  }

  // POSIX path relative to the directory rep's root (e.g. "sub/file.txt").
  string relative_path = 1;

  Kind kind = 2;

  // File size in bytes (0 for a directory or symlink).
  uint64 byte_count = 3;

  // POSIX mode permission bits (the low 12 bits of `st_mode`), carrying the
  // executable bit and other permissions so the pasted file preserves them.
  uint32 posix_permissions = 4;

  // Modification time in milliseconds since the Unix epoch (UTC).
  int64 mtime_ms = 5;

  // For a symlink, the raw (unresolved) link target; empty otherwise.
  string symlink_target = 6;

  // Whether a directory node is an OS package (.app/.rtfd/…), so the consumer
  // gives it a package `contentType` and the pasted folder opens as a bundle.
  bool is_package = 7;

  // Stable per-tree sequence number identifying this node within the directory
  // rep (assigned by the producer's walk, 1-based). Encoded into a child
  // fetch's `transfer_id` so cancels/aborts route deterministically.
  uint32 child_seq = 8;
}

// A directory representation's full tree listing, streamed (serialized) as the
// inline payload of a listing-mode `ClipboardTreeFetch` reply. One message
// carries every node; it is metadata-sized (a 100k-entry tree serializes to a
// few MiB) and rides the SHA-256-verified stream transport, so it needs no
// separate pagination frame — the chunked transport paginates it.
message ClipboardTreeListing {
  repeated ClipboardTreeEntry entries = 1;

  // The directory rep's own (root folder's) modification time in milliseconds
  // since the Unix epoch (UTC). The entries carry every descendant's mtime but
  // not the root's — without this the pasted folder lands with an epoch date.
  // 0 when unknown (the consumer leaves the date unset).
  int64 root_mtime_ms = 2;
}

// Liveness ping exchanged on the control channel. Each side sends one on a
// recurring timer (default ~5 seconds). Receivers refresh their "last seen"
// clock for the peer and treat extended silence as the peer being hung —
// distinct from a clean socket disconnect.
//
// `nonce` is opaque. Receivers do not echo it; both sides emit independent
// streams of heartbeats. The field is reserved for future use (e.g. RTT
// sampling) without bumping `Frame.protocol_version`.
message Heartbeat {
  uint64 nonce = 1;
}

// Sent by the host on the control channel to tell the guest agent which
// optional capabilities are currently enabled for this VM. The guest agent
// uses it to actually stop work for disabled capabilities (close channels,
// stop pasteboard polling, drop buffered records) rather than just having
// the host ignore inbound traffic.
//
// The host sends one `PolicyUpdate` immediately after the control-plane
// `Hello` exchange and one each time the user toggles a capability while
// the VM is running. Each message carries the full current policy snapshot;
// receivers compare against their last applied state and act on diffs.
message PolicyUpdate {
  // Whether the guest's log-forwarding agent should connect on the log port
  // and stream `LogRecord` frames to the host.
  bool log_forwarding_enabled = 1;

  // Whether the guest's clipboard agent should poll `NSPasteboard.general`
  // and exchange `ClipboardOffer`/`ClipboardRequest` and the chunk-streamed
  // data frames with the host on the clipboard port.
  bool clipboard_sharing_enabled = 2;
}

// Reported by either side when a request cannot be fulfilled, or as an
// asynchronous notification of a problem (e.g. malformed request, capability
// mismatch). The receiver may log and continue; it should not assume the
// peer is gone.
message Error {
  // Stable machine-readable code, e.g. "version.unsupported",
  // "format.unavailable", "transfer.too.large".
  string code = 1;

  // Human-readable detail. May be shown in logs or surfaced to the user.
  string message = 2;

  // Optional reference to the message type this error replies to,
  // e.g. "clipboard.request". Populated when the error is causally linked
  // to a specific incoming message.
  optional string in_reply_to = 3;
}
