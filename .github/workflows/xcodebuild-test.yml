name: Build & Test

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-26
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          echo "XCODE_BUILD=$(xcodebuild -version | awk '/Build version/ {print $3}')" >> "$GITHUB_ENV"

      - name: Cache SwiftPM checkouts
        uses: actions/cache@v5
        with:
          # Nested under DerivedData/Kernova to match the Makefile's canonical
          # layout (see below). The key's `spm2` segment marks that move: a
          # same-key cache saved at the old flat path would restore uselessly
          # and, existing, block a save at the new path.
          path: DerivedData/Kernova/SourcePackages
          key: ${{ runner.os }}-spm2-${{ env.XCODE_BUILD }}-${{ hashFiles('Kernova.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}

      # The two invocations below mirror the Makefile's canonical XCODEBUILD_FLAGS
      # (same project/scheme/destination/configuration and the nested
      # DerivedData/Kernova layout) — CI can't run `make test` itself because the
      # bootstrap prerequisite needs a signing identity the runner doesn't have,
      # so keep changes to the shared flags in sync with the Makefile by hand.
      # CI-only additions on top: the build-for-testing/test-without-building
      # split, CODE_SIGNING_ALLOWED=NO, COMPILER_INDEX_STORE_ENABLE=NO,
      # -skipPackagePluginValidation, and -resultBundlePath.
      #
      # CODE_SIGNING_ALLOWED=NO (not ad-hoc `CODE_SIGN_IDENTITY=-`): CI has no signing
      # identity and the unit tests never touch the app-group container, so signing buys
      # nothing here. The Debug config uses the team-prefixed
      # `$(DEVELOPMENT_TEAM).app.kernova` group (Release keeps canonical `group.app.kernova`),
      # which — unlike the profile-required `group.` form — could be ad-hoc signed; we still
      # skip signing entirely for the reason above. DEVELOPMENT_TEAM is derived per-developer
      # into the gitignored Config/Local.xcconfig by `make bootstrap` (#476) and is NOT set on
      # CI (which builds xcodebuild directly, never `make`), so it resolves empty and
      # `$(KERNOVA_APP_GROUP)` expands to `.app.kernova`. That's harmless here: signing is off,
      # so the malformed app-group value is never validated, and the unit tests use stub
      # bundles rather than resolving the real container (verified: build-for-testing succeeds
      # with an empty team). Mirrors dead-code.yml.
      - name: Build for testing
        run: |
          set -o pipefail
          xcodebuild build-for-testing \
            -project Kernova.xcodeproj \
            -scheme Kernova \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData/Kernova \
            -configuration Debug \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      - name: Test without building
        run: |
          set -o pipefail
          xcodebuild test-without-building \
            -project Kernova.xcodeproj \
            -scheme Kernova \
            -destination 'platform=macOS' \
            -derivedDataPath DerivedData/Kernova \
            -configuration Debug \
            -resultBundlePath artifacts/TestResults.xcresult \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            2>&1 | if command -v xcbeautify &>/dev/null; then xcbeautify --renderer github-actions; else cat; fi

      # Kernova.xctestplan runs with retryOnFailure (maximumTestRepetitions: 2):
      # it re-runs the whole bundle and lets a test that failed its first attempt
      # pass the job on a retry, silently masking the flake — a green run can hide
      # a ~35%-flaky test (which is exactly how #523 stayed green for a day). This
      # step reads the result bundle and warns on any test with a failed attempt,
      # so a passed-on-retry flake is visible instead of an invisible green. It is
      # visibility-only and never fails the job (retryOnFailure still guards merges).
      - name: Report flaky (retried) tests
        if: always()
        run: |
          bundle="artifacts/TestResults.xcresult"
          if [ ! -d "$bundle" ]; then
            echo "No test result bundle at $bundle — skipping flake report."
            exit 0
          fi
          if ! command -v jq >/dev/null 2>&1; then
            echo "jq not found — skipping flake report."
            exit 0
          fi
          # Each attempt is a "Repetition" node; a genuine flake failed at least
          # one Repetition but still passed overall (a bundle-wide retry marks
          # every passed test's repetitions "Passed", so this does not
          # false-positive on the other tests dragged through the retry). A test
          # that failed every repetition is broken, not flaky — it already fails
          # the job on its own via xcodebuild's exit code, so `result == "Passed"`
          # excludes it here to avoid mislabeling it as a mere flake. Dedup on
          # `.nodeIdentifier` (suite-qualified) rather than `.name` (bare display
          # name), since two unrelated suites can share a test's display name.
          if ! flaky="$(xcrun xcresulttool get test-results tests --path "$bundle" 2>&1 | jq -r '
                [ .. | objects
                  | select(.nodeType? == "Test Case" and .result == "Passed")
                  | select(any(.children[]?; .nodeType == "Repetition" and .result == "Failed"))
                  | (.nodeIdentifier // .name) ] | unique[]' 2>&1)"; then
            echo "Could not read/parse test results at $bundle — skipping flake report. Output: $flaky"
            exit 0
          fi
          if [ -z "$flaky" ]; then
            echo "No flaky (failed-then-retried) tests in this run."
            exit 0
          fi
          {
            echo "### ⚠️ Flaky tests (failed at least one attempt)"
            echo ""
            echo "Retried via \`retryOnFailure\`, so these may have passed the job on a later attempt. Investigate before they degrade further:"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY" || true
          while IFS= read -r name; do
            # GitHub's `::` workflow-command protocol requires literal `%` in the
            # message to be percent-encoded so it isn't misparsed as an escape.
            escaped="${name//%/%25}"
            echo "::warning title=Flaky test (failed then retried)::${escaped}"
            echo "- \`${name}\`" >> "$GITHUB_STEP_SUMMARY" || true
          done <<< "$flaky"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          # RATIONALE: upload the PARENT dir, not the `.xcresult` bundle directly.
          # upload-artifact roots the archive at the lowest common ancestor of the
          # matched files, so pointing it at the bundle drops the `.xcresult`
          # wrapper — the download then unpacks as a bare Info.plist + Data/ that
          # xcresulttool can't open without first renaming it back. Uploading the
          # enclosing `artifacts/` keeps `TestResults.xcresult/` intact in the
          # download (matching the `-resultBundlePath artifacts/TestResults.xcresult`
          # above), so `gh run download` yields a directly-usable result bundle.
          path: artifacts/
          retention-days: 7
