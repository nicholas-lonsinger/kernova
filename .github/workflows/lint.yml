name: Lint

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  # The job name "swift-format" is a required check in the repo ruleset — keep
  # it stable. Its `make lint` step now covers shell scripts too (bash -n +
  # shellcheck via the lint-shell target, which treats shellcheck as REQUIRED
  # when $CI is set), so shell findings gate merges through this same check.
  swift-format:
    runs-on: macos-26
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcrun swift-format --version

      # The macOS runner images ship shellcheck; install it only if a future
      # image drops it, so `make lint` never silently skips static analysis
      # here (lint-shell hard-fails on CI without it).
      - name: Ensure shellcheck
        run: command -v shellcheck >/dev/null || brew install shellcheck

      - name: make lint (swift-format --strict + shell lint)
        run: make lint
